# .github/workflows/ci-cd.yml
name: Python CI/CD with Nuitka

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11, 3.12]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install nuitka

      - name: Run tests
        run: |
          if [ -d tests ]; then
            pytest tests
          fi

  build-executable:
    runs-on: ${{ matrix.os || 'ubuntu-latest' }}
    needs: build-and-test
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka

      - name: Setup Dependency Walker (Windows only)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $depwalker = "$env:USERPROFILE\depwalker"
          if (-not (Test-Path $depwalker)) {
            Invoke-WebRequest -Uri "https://www.dependencywalker.com/depends22_x64.zip" -OutFile "$env:USERPROFILE\depends.zip"
            Expand-Archive "$env:USERPROFILE\depends.zip" -DestinationPath $depwalker
          }
          echo "$depwalker" >> $env:GITHUB_PATH

      - name: Build executable
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            # macOS .app bundle with optional icon
            python -m nuitka --standalone  --include-package=markdown --include-package=mdx_partial_gfm --macos-create-app-bundle --enable-plugin=pyside6 --output-dir=dist --macos-app-icon=macos/tws.icns --output-filename="tiffany writing executable" --macos-app-name="tiffany writing executable" "tiffany writing executable.py"
            cp macos/run.command dist/
            chmod -x dist/run.command
          else
            # Linux/Windows onefile executable
            python -m nuitka --standalone --onefile --output-dir=dist --include-package=markdown --include-package=mdx_partial_gfm --enable-plugin=pyside6 --assume-yes-for-downloads --windows-icon-from-ico=windows/tws.ico "tiffany writing executable.py"
          fi
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tiffwriter-${{ runner.os }}-${{ github.sha }}
          path: dist/
